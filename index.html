<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>サイコロアニメーション（目配置修正版）</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f0f0f0;
      margin: 0;
    }

    /* サイコロ全体のコンテナとアニメーション */
    .dice-container {
      perspective: 1000px;
    }

    .dice {
      width: 100px;
      height: 100px;
      position: relative;
      transform-style: preserve-3d;
      /* 前回のローリングアニメーションを維持（必要に応じて変更してください） */
      animation: roll 4s infinite linear;
    }

    @keyframes roll {
      0% { transform: rotateX(0deg) rotateY(0deg); }
      100% { transform: rotateX(360deg) rotateY(360deg); }
    }

    /* サイコロの面共通スタイル（画像のような角丸と立体的な黒い影） */
    .face {
      position: absolute;
      width: 100px;
      height: 100px;
      background: white;
      border: 3px solid #000;
      border-radius: 12px;
      box-shadow: 4px 4px 0px #000; /* 画像のような右下の立体的な影を再現 */
      box-sizing: border-box;
      padding: 8px;
      
      /* ドットを正確に配置するための3x3グリッド */
      display: grid;
      grid-template-areas:
        "a b c"
        "d e f"
        "g h i";
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      align-items: center;
      justify-items: center;
    }

    /* 3D空間での各面の配置 */
    .face-1 { transform: translateZ(50px); }
    .face-2 { transform: rotateY(180deg) translateZ(50px); }
    .face-3 { transform: rotateY(90deg) translateZ(50px); }
    .face-4 { transform: rotateY(-90deg) translateZ(50px); }
    .face-5 { transform: rotateX(90deg) translateZ(50px); }
    .face-6 { transform: rotateX(-90deg) translateZ(50px); }

    /* ドットの共通スタイル */
    .dot {
      width: 18px;
      height: 18px;
      background-color: #000;
      border-radius: 50%;
    }

    /* 1の目だけ中央で大きく赤色 */
    .face-1 .dot {
      background-color: #ff0000;
      width: 24px;
      height: 24px;
      grid-area: e; /* 中央 */
    }

    /* 画像に合わせた各面のドット配置 */
    /* 2の目：左下、右上 */
    .face-2 .dot:nth-child(1) { grid-area: g; }
    .face-2 .dot:nth-child(2) { grid-area: c; }

    /* 3の目：左下、中央、右上（斜めライン） */
    .face-3 .dot:nth-child(1) { grid-area: g; }
    .face-3 .dot:nth-child(2) { grid-area: e; }
    .face-3 .dot:nth-child(3) { grid-area: c; }

    /* 4の目：四隅 */
    .face-4 .dot:nth-child(1) { grid-area: a; }
    .face-4 .dot:nth-child(2) { grid-area: c; }
    .face-4 .dot:nth-child(3) { grid-area: g; }
    .face-4 .dot:nth-child(4) { grid-area: i; }

    /* 5の目：四隅 ＋ 中央 */
    .face-5 .dot:nth-child(1) { grid-area: a; }
    .face-5 .dot:nth-child(2) { grid-area: c; }
    .face-5 .dot:nth-child(3) { grid-area: e; }
    .face-5 .dot:nth-child(4) { grid-area: g; }
    .face-5 .dot:nth-child(5) { grid-area: i; }

    /* 6の目：左縦3つ、右縦3つ */
    .face-6 .dot:nth-child(1) { grid-area: a; }
    .face-6 .dot:nth-child(2) { grid-area: d; }
    .face-6 .dot:nth-child(3) { grid-area: g; }
    .face-6 .dot:nth-child(4) { grid-area: c; }
    .face-6 .dot:nth-child(5) { grid-area: f; }
    .face-6 .dot:nth-child(6) { grid-area: i; }
  </style>
</head>
<body>

  <div class="dice-container">
    <div class="dice">
      <!-- 1の目 -->
      <div class="face face-1">
        <div class="dot"></div>
      </div>
      <!-- 2の目 -->
      <div class="face face-2">
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <!-- 3の目 -->
      <div class="face face-3">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <!-- 4の目 -->
      <div class="face face-4">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <!-- 5の目 -->
      <div class="face face-5">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <!-- 6の目 -->
      <div class="face face-6">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>

</body>
</html>
